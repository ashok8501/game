<!DOCTYPE html>
<html>
<head>
    <title>🔥 FLAMES Game 🔥</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #ff512f, #dd2476);
            color: white;
        }

        form {
            background: white;
            color: black;
            padding: 25px;
            margin: 60px auto;
            width: 300px;
            border-radius: 12px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #ff512f;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🔥 FLAMES Game 🔥</h1>
<p>Check your relationship 😏</p>

<form action="/submit" method="post">
    <input type="text" name="boy_name" placeholder="Boy Name 👦" required>
    <input type="text" name="girl_name" placeholder="Girl Name 👧" required>

    <button type="submit">Check Result 💥</button>
</form>

</body>
</html>
